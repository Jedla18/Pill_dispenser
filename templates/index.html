<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pill Dispenser Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <div id="login-view" class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow-sm" style="width: 25rem;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-primary"><i class="bi bi-capsule"></i> Pill Dispenser</h3>
                <div class="mb-3">
                    <label class="form-label">Uživatelské jméno / ID zařízení</label>
                    <input type="text" id="username" class="form-control" placeholder="Např. pristroj1">
                </div>
                <div class="mb-4">
                    <label class="form-label">Heslo</label>
                    <input type="password" id="password" class="form-control" placeholder="****">
                </div>
                <button id="login-btn" class="btn btn-primary w-100 fs-5">Přihlásit se</button>
            </div>
        </div>
    </div>

    <div id="app-view" class="container-fluid" style="display: none;">
        <div class="row vh-100">
            <nav class="col-md-3 col-lg-2 d-md-block bg-dark text-white sidebar py-4">
                <h4 class="text-center mb-4 text-primary"><i class="bi bi-capsule"></i> Pill Dispenser</h4>
                <ul class="nav flex-column nav-pills">
                    <li class="nav-item">
                        <a class="nav-link text-white mb-2" href="#" onclick="loadDashboard()"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white mb-2" href="#" onclick="loadAddPills()"><i class="bi bi-plus-circle me-2"></i> Přidání pilulek</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white mb-2" href="#" onclick="startFillingProcess()">
                            <i class="bi bi-box-arrow-in-down me-2"></i> Plnění dávkovače
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white mb-2" href="#" onclick="loadConsumption()"><i class="bi bi-bar-chart-line me-2"></i> Historie odběrů </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white mb-2" href="#" onclick="loadCustomTable()"><i class="bi bi-table me-2"></i> Historie vážení</a>
                    </li>
                </ul>
                <hr class="text-secondary mt-5">
                <button onclick="logout()" class="btn btn-outline-danger w-100 mt-3"><i class="bi bi-box-arrow-right"></i> Odhlásit</button>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4" id="main-content"></main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
